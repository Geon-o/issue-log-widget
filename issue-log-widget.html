<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈 로그</title>
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') {
    document.documentElement.setAttribute('data-theme', saved);
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAFAFA;
    --ink: #0A0A0A;
    --ink-soft: #4A4A4A;
    --ink-faint: #B0B0B0;
    --line: #0A0A0A;
    --signal: #FF3300;
    --resolved: #00A651;
    --pending: #FFB800;
    --hold: #9C9C9C;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #0A0A0A;
      --ink: #F5F5F0;
      --ink-soft: #B8B8B0;
      --ink-faint: #5A5A55;
      --line: #F5F5F0;
      --signal: #FF4726;
      --resolved: #2ECC71;
      --pending: #FFC93C;
      --hold: #6E6E6E;
    }
  }

  :root[data-theme="dark"] {
    --paper: #0A0A0A;
    --ink: #F5F5F0;
    --ink-soft: #B8B8B0;
    --ink-faint: #5A5A55;
    --line: #F5F5F0;
    --signal: #FF4726;
    --resolved: #2ECC71;
    --pending: #FFC93C;
    --hold: #6E6E6E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 4px solid var(--line);
    padding-bottom: 18px;
    margin-bottom: 4px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .brand .mark {
    width: 14px; height: 14px;
    background: var(--signal);
    display: inline-block;
    border-radius: 50%;
  }
  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    letter-spacing: -0.02em;
    margin: 0;
    line-height: 0.95;
  }
  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    text-align: right;
  }
  .count b { color: var(--signal); font-size: 15px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .theme-toggle {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    cursor: pointer;
    padding: 0;
  }
  .theme-toggle:hover {
    background: var(--ink);
    color: var(--paper);
  }
  .theme-toggle svg { pointer-events: none; }

  /* ---- controls ---- */
  .controls {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--ink);
    margin-bottom: 0;
  }
  .search-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 4px;
    border-right: 1px solid var(--ink);
  }
  .search-wrap svg { flex-shrink: 0; }
  .search-wrap input {
    border: none;
    outline: none;
    background: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    width: 100%;
    color: var(--ink);
  }
  .search-wrap input::placeholder { color: var(--ink-faint); }

  .filters {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 0 10px 16px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    padding: 7px 12px;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip:hover { color: var(--ink); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ---- list ---- */
  .list { margin-top: 0; }

  .entry {
    position: relative;
    border-bottom: 1px solid var(--ink);
    padding: 28px 0;
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 4px;
    cursor: pointer;
  }
  .entry:hover .num { color: var(--signal); }

  .num {
    font-family: 'Archivo Black', sans-serif;
    font-size: 54px;
    line-height: 0.85;
    color: var(--ink-faint);
    transition: color 0.15s ease;
    user-select: none;
  }

  .entry-main { min-width: 0; }

  .entry-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .entry-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .status-dot {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 7px;
    padding-top: 5px;
    color: var(--ink);
    white-space: nowrap;
  }
  .status-dot::before {
    content: '';
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--hold);
  }
  .status-dot.해결됨::before { background: var(--resolved); }
  .status-dot.진행중::before { background: var(--pending); }

  .entry-meta {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .cat-pill {
    background: var(--ink);
    color: var(--paper);
    padding: 2px 8px;
    font-weight: 600;
  }
  .tag { color: var(--ink-faint); }

  .entry-summary {
    margin-top: 10px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 640px;
  }

  /* ---- detail ---- */
  .detail {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px solid var(--signal);
  }
  .detail.open { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 32px; }
  @media (max-width: 640px) {
    .detail.open { grid-template-columns: 1fr; }
    .entry { grid-template-columns: 60px 1fr; }
    .num { font-size: 34px; }
  }

  .section h3 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .section h3::before {
    content: '';
    width: 11px;
    height: 11px;
    background: var(--signal);
    flex-shrink: 0;
  }
  .section p {
    margin: 0;
    font-size: 16px;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .section pre {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 18px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    margin: 12px 0 0;
  }

  .empty, .loading {
    padding: 80px 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-faint);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="mark"></span>
      <h1>ISSUE<br>LOG</h1>
    </div>
    <div class="header-right">
      <div class="count" id="countMeta">— / —</div>
      <button class="theme-toggle" id="themeToggle" aria-label="테마 전환" title="테마 전환"></button>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="검색">
    </div>
    <div class="filters" id="filterBar">
      <div class="chip active" data-cat="all">전체</div>
    </div>
  </div>

  <div class="list" id="list">
    <div class="loading">LOADING…</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gxwesildrqlctoafbfpf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4d2VzaWxkcnFsY3RvYWZiZnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzkyNzIsImV4cCI6MjA5OTc1NTI3Mn0.kFqaGG-J6R7KoodeXcWdsQE_-rrDRO6aQUomJRbU81I';

let allIssues = [];
let activeCat = 'all';
let searchTerm = '';

const SUN_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="4.5"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.5" y1="4.5" x2="6.2" y2="6.2"/><line x1="17.8" y1="17.8" x2="19.5" y2="19.5"/><line x1="4.5" y1="19.5" x2="6.2" y2="17.8"/><line x1="17.8" y1="6.2" x2="19.5" y2="4.5"/></svg>';
const MOON_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>';

function currentTheme() {
  const attr = document.documentElement.getAttribute('data-theme');
  if (attr === 'dark' || attr === 'light') return attr;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function updateToggleIcon(theme) {
  const btn = document.getElementById('themeToggle');
  btn.innerHTML = theme === 'dark' ? SUN_ICON : MOON_ICON;
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  updateToggleIcon(theme);
}

updateToggleIcon(currentTheme());
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
});

async function loadIssues() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/issues?select=*&order=id.asc`, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    allIssues = await res.json();
    buildFilterBar();
    render();
  } catch (err) {
    document.getElementById('list').innerHTML = `<div class="empty">데이터를 불러오지 못했습니다<br>${err.message}</div>`;
  }
}

function buildFilterBar() {
  const cats = [...new Set(allIssues.map(i => i.category).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<div class="chip active" data-cat="all">전체</div>` +
    cats.map(c => `<div class="chip" data-cat="${c}">${c}</div>`).join('');

  bar.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.dataset.cat;
      render();
    });
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function render() {
  const term = searchTerm.trim().toLowerCase();
  const filtered = allIssues.filter(issue => {
    if (activeCat !== 'all' && issue.category !== activeCat) return false;
    if (!term) return true;
    const haystack = [issue.title, issue.summary, issue.category, ...(issue.tags || [])].join(' ').toLowerCase();
    return haystack.includes(term);
  });

  document.getElementById('countMeta').innerHTML = `<b>${filtered.length}</b> / ${allIssues.length}`;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">NO MATCHES</div>`;
    return;
  }

  list.innerHTML = filtered.map((issue) => {
    const no = String(issue.id).padStart(2, '0');
    const tags = (issue.tags || []).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join(' ');
    const statusClass = issue.status || '해결됨';

    return `
    <div class="entry" onclick="toggleDetail(${issue.id})">
      <div class="num">${no}</div>
      <div class="entry-main">
        <div class="entry-top">
          <div class="entry-title">${escapeHtml(issue.title)}</div>
          <div class="status-dot ${statusClass}">${statusClass}</div>
        </div>
        <div class="entry-meta">
          <span class="cat-pill">${escapeHtml(issue.category || '')}</span>
          ${tags}
          <span>${issue.issue_date || ''}</span>
        </div>
        ${issue.summary ? `<div class="entry-summary">${escapeHtml(issue.summary)}</div>` : ''}
        <div class="detail" id="detail-${issue.id}">
          ${renderSection('문제상황', issue.problem)}
          ${renderSection('원인분석', issue.cause)}
          ${renderSection('해결방법', issue.solution)}
          ${renderSection('배운점', issue.lesson)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSection(label, content) {
  if (!content) return '';
  return `<div class="section"><h3>${label}</h3><p>${escapeHtml(content)}</p></div>`;
}

function toggleDetail(id) {
  const el = document.getElementById(`detail-${id}`);
  el.classList.toggle('open');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  render();
});
document.getElementById('searchInput').addEventListener('click', (e) => e.stopPropagation());

loadIssues();
</script>
</body>
</html>
