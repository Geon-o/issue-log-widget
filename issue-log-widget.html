<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈 로그</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0F1B2D;
    --bg-panel: #16283F;
    --bg-panel-raised: #1C3350;
    --grid-line: #24405C;
    --grid-line-faint: #1A2E45;
    --ink: #E8EDF2;
    --ink-dim: #8FA3B8;
    --ink-faint: #5A7089;
    --cyan: #5FB4D9;
    --cyan-dim: #3D7A96;
    --resolved: #6FCF97;
    --pending: #F2C94C;
    --cat-db: #5FB4D9;
    --cat-java: #E08E45;
    --cat-algo: #A78BE0;
    --cat-etc: #8A9BAE;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-deep);
    background-image:
      repeating-linear-gradient(0deg, var(--grid-line-faint) 0, var(--grid-line-faint) 1px, transparent 1px, transparent 32px),
      repeating-linear-gradient(90deg, var(--grid-line-faint) 0, var(--grid-line-faint) 1px, transparent 1px, transparent 32px);
    color: var(--ink);
    font-family: 'IBM Plex Sans KR', sans-serif;
    min-height: 100vh;
    padding: 28px 20px 60px;
  }

  .wrap { max-width: 780px; margin: 0 auto; }

  /* ---- title block ---- */
  .titleblock {
    border: 1px solid var(--grid-line);
    background: var(--bg-panel);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }
  .titleblock::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 6px; height: 100%;
    background: var(--cyan);
  }
  .titleblock h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--cyan);
    margin: 0;
    padding-left: 14px;
  }
  .titleblock .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    padding-left: 14px;
  }
  .search-box {
    flex: 1 1 220px;
    display: flex;
    align-items: center;
    background: var(--bg-deep);
    border: 1px solid var(--grid-line);
    padding: 8px 12px;
    gap: 8px;
  }
  .search-box svg { flex-shrink: 0; opacity: 0.5; }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--ink-faint); }

  /* ---- filters ---- */
  .filters {
    margin-top: 10px;
    border: 1px solid var(--grid-line);
    border-top: none;
    background: var(--bg-panel);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.02em;
    padding: 5px 11px;
    border: 1px solid var(--grid-line);
    background: var(--bg-deep);
    color: var(--ink-dim);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .chip:hover { border-color: var(--cyan-dim); color: var(--ink); }
  .chip.active { background: var(--cyan); border-color: var(--cyan); color: var(--bg-deep); font-weight: 600; }
  .chip.active .dot { background: var(--bg-deep); }

  /* ---- list ---- */
  .list { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    display: flex;
    border: 1px solid var(--grid-line);
    background: var(--bg-panel);
    overflow: hidden;
  }
  .card .rail {
    flex: 0 0 34px;
    background: var(--bg-deep);
    border-right: 1px solid var(--grid-line);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    position: relative;
  }
  .card .rail .tick {
    width: 12px; height: 1px; background: var(--grid-line);
    margin: 3px 0;
  }
  .card .rail .catbar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .card .body { flex: 1; min-width: 0; }

  .card .head {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card .head:hover { background: var(--bg-panel-raised); }

  .row-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }
  .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
    min-width: 160px;
  }
  .status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid currentColor;
  }
  .status.해결됨 { color: var(--resolved); }
  .status.진행중 { color: var(--pending); }
  .status.보류 { color: var(--ink-faint); }

  .row-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
  }
  .cat-tag {
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .tags span { color: var(--cyan-dim); }
  .summary {
    font-size: 12.5px;
    color: var(--ink-dim);
    line-height: 1.5;
  }

  /* ---- expanded ---- */
  .detail {
    display: none;
    padding: 4px 18px 18px;
    border-top: 1px dashed var(--grid-line);
    margin: 0 18px;
  }
  .detail.open { display: block; }
  .section { margin-top: 14px; }
  .section h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--cyan);
    margin: 0 0 6px;
    text-transform: uppercase;
  }
  .section p {
    margin: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .section pre {
    background: var(--bg-deep);
    border: 1px solid var(--grid-line);
    padding: 12px 14px;
    overflow-x: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-dim);
    margin: 8px 0 0;
  }

  .empty, .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  @media (max-width: 480px) {
    .titleblock { flex-direction: column; align-items: flex-start; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="titleblock">
    <div>
      <h1>ISSUE LOG</h1>
      <div class="meta" id="countMeta">· · ·</div>
    </div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="제목, 태그, 요약 검색...">
    </div>
  </div>

  <div class="filters" id="filterBar">
    <div class="chip active" data-cat="all"><span class="dot" style="background:var(--cyan)"></span>전체</div>
  </div>

  <div class="list" id="list">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gxwesildrqlctoafbfpf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4d2VzaWxkcnFsY3RvYWZiZnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzkyNzIsImV4cCI6MjA5OTc1NTI3Mn0.kFqaGG-J6R7KoodeXcWdsQE_-rrDRO6aQUomJRbU81I';

const CAT_COLORS = {
  'Database/SQL': 'var(--cat-db)',
  'Java': 'var(--cat-java)',
  '알고리즘/자료구조': 'var(--cat-algo)',
  '기타': 'var(--cat-etc)'
};

let allIssues = [];
let activeCat = 'all';
let searchTerm = '';

async function loadIssues() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/issues?select=*&order=id.asc`, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    if (!res.ok) throw new Error('fetch failed: ' + res.status);
    allIssues = await res.json();
    buildFilterBar();
    render();
  } catch (err) {
    document.getElementById('list').innerHTML = `<div class="empty">데이터를 불러오지 못했습니다.<br>${err.message}</div>`;
  }
}

function buildFilterBar() {
  const cats = [...new Set(allIssues.map(i => i.category).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<div class="chip active" data-cat="all"><span class="dot" style="background:var(--cyan)"></span>전체</div>` +
    cats.map(c => `<div class="chip" data-cat="${c}"><span class="dot" style="background:${CAT_COLORS[c] || 'var(--cat-etc)'}"></span>${c}</div>`).join('');

  bar.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.dataset.cat;
      render();
    });
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function render() {
  const term = searchTerm.trim().toLowerCase();
  const filtered = allIssues.filter(issue => {
    if (activeCat !== 'all' && issue.category !== activeCat) return false;
    if (!term) return true;
    const haystack = [
      issue.title, issue.summary, issue.category,
      ...(issue.tags || [])
    ].join(' ').toLowerCase();
    return haystack.includes(term);
  });

  document.getElementById('countMeta').textContent = `TOTAL ${allIssues.length} · SHOWING ${filtered.length}`;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">일치하는 이슈가 없습니다.</div>`;
    return;
  }

  list.innerHTML = filtered.map((issue, idx) => {
    const no = String(issue.id).padStart(3, '0');
    const catColor = CAT_COLORS[issue.category] || 'var(--cat-etc)';
    const tags = (issue.tags || []).map(t => `<span>#${escapeHtml(t)}</span>`).join(' ');
    const statusClass = issue.status || '해결됨';

    return `
    <div class="card">
      <div class="rail">
        <div class="catbar" style="background:${catColor}"></div>
        ${Array.from({length: 5}).map(() => '<div class="tick"></div>').join('')}
      </div>
      <div class="body">
        <div class="head" onclick="toggleDetail(${issue.id})">
          <div class="row-top">
            <span class="no">NO.${no}</span>
            <span class="title">${escapeHtml(issue.title)}</span>
            <span class="status ${statusClass}">${statusClass}</span>
          </div>
          <div class="row-meta">
            <span class="cat-tag" style="color:${catColor}">${escapeHtml(issue.category || '')}</span>
            <span class="tags">${tags}</span>
            <span>${issue.issue_date || ''}</span>
          </div>
          ${issue.summary ? `<div class="summary">${escapeHtml(issue.summary)}</div>` : ''}
        </div>
        <div class="detail" id="detail-${issue.id}">
          ${renderSection('문제상황', issue.problem)}
          ${renderSection('원인분석', issue.cause)}
          ${renderSection('해결방법', issue.solution)}
          ${renderSection('배운점', issue.lesson)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSection(label, content) {
  if (!content) return '';
  return `
    <div class="section">
      <h3>${label}</h3>
      <p>${escapeHtml(content)}</p>
    </div>`;
}

function toggleDetail(id) {
  const el = document.getElementById(`detail-${id}`);
  el.classList.toggle('open');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  render();
});

loadIssues();
</script>
</body>
</html>
